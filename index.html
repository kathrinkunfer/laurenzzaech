<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Laurenz Zäch — Grappling Coach</title>
<meta name="description" content="Laurenz Zäch — Grappling Coach & Personal Training. Coming soon." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Montserrat:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --pink: #f6c6e3;
    --blue: #2e16e8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: "Montserrat", system-ui, sans-serif;
    background: var(--pink);
    color: var(--blue);
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ---------- Content ---------- */
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 6vw;
  }

  .title {
    font-family: "Kaushan Script", cursive;
    font-weight: 400;
    color: var(--blue);
    font-size: clamp(3.2rem, 12vw, 9rem);
    line-height: 1.05;
    letter-spacing: 0.005em;
    transform: rotate(-3deg);
    opacity: 0;
    animation: rise 1.1s cubic-bezier(.2,.7,.2,1) 0.15s forwards;
    text-shadow: 0 6px 24px rgba(46, 22, 232, 0.18);
  }

  /* Optional real-logo image: drop logo.png/svg in the repo and it replaces the text */
  .logo-img {
    max-width: min(820px, 88vw);
    height: auto;
    /* logo is blue-on-white -> multiply drops the white onto the pink */
    mix-blend-mode: multiply;
    opacity: 0;
    animation: rise 1.1s cubic-bezier(.2,.7,.2,1) 0.15s forwards;
  }

  .subtitle {
    margin-top: clamp(0.6rem, 2vw, 1.2rem);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: clamp(0.8rem, 2.2vw, 1.4rem);
    opacity: 0;
    animation: rise 1.1s cubic-bezier(.2,.7,.2,1) 0.5s forwards;
  }

  .soon {
    margin-top: clamp(3rem, 9vw, 7rem);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4em;
    font-size: clamp(0.75rem, 1.8vw, 1.05rem);
    opacity: 0;
    animation: rise 1.1s cubic-bezier(.2,.7,.2,1) 0.85s forwards;
  }

  .soon::after {
    content: "";
    display: block;
    width: 0;
    height: 2px;
    background: var(--blue);
    margin: 0.9rem auto 0;
    border-radius: 2px;
    animation: line 1.4s ease 1.2s forwards;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(26px) rotate(var(--r, 0deg)); }
    to   { opacity: 1; transform: translateY(0) rotate(var(--r, 0deg)); }
  }
  .title { --r: 0deg; transform: rotate(0deg); }

  @keyframes line { to { width: 120px; } }

  .nav-contact {
    position: fixed;
    top: clamp(1.2rem, 3vw, 2rem);
    right: clamp(1.2rem, 3vw, 2.4rem);
    z-index: 2;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: clamp(0.7rem, 1.5vw, 0.9rem);
    opacity: 0;
    animation: rise 1.1s cubic-bezier(.2,.7,.2,1) 1s forwards;
  }
  .nav-contact a {
    color: var(--blue);
    text-decoration: none;
    border-bottom: 2px solid var(--blue);
    padding-bottom: 2px;
    transition: opacity 0.2s;
  }
  .nav-contact a:hover { opacity: 0.65; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; opacity: 1 !important; }
  }
</style>
</head>
<body>
  <nav class="nav-contact"><a href="contact.html">Contact</a></nav>

  <main class="content">
    <h1 class="title"><img class="logo-img" src="logo.png" alt="Laurenz Zäch" /></h1>
    <p class="subtitle">Grappling Coach&nbsp;&nbsp;|&nbsp;&nbsp;Personal Training</p>
    <p class="soon">Coming Soon</p>
  </main>
</body>
</html>
